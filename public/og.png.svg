<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <rect width="1200" height="630" fill="#000"/>
  
  <!-- Gradient background -->
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a0a2e"/>
      <stop offset="100%" style="stop-color:#0a0a0f"/>
    </linearGradient>
    <linearGradient id="text" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#a855f7"/>
      <stop offset="100%" style="stop-color:#ec4899"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  
  <!-- Decorative elements -->
  <circle cx="1100" cy="100" r="200" fill="rgba(168,85,247,0.1)"/>
  <circle cx="150" cy="550" r="150" fill="rgba(6,182,212,0.08)"/>
  
  <!-- Left: Logo area -->
  <rect x="60" y="60" width="80" height="80" rx="16" fill="url(#text)"/>
  <text x="60" y="120" font-size="40" font-family="Arial" font-weight="bold" fill="white">A</text>
  
  <!-- Main title -->
  <text x="60" y="240" font-size="72" font-family="Arial" font-weight="black" fill="white">AI Agents</text>
  <text x="60" y="320" font-size="72" font-family="Arial" font-weight="black" fill="url(#text)">That Pay Their Bills</text>
  
  <!-- Subtitle -->
  <text x="60" y="400" font-size="24" font-family="Arial" fill="rgba(255,255,255,0.5)">Consensus 2026 · Miami</text>
  
  <!-- Bottom: Two tracks -->
  <rect x="60" y="470" width="200" height="50" rx="12" fill="rgba(168,85,247,0.2)" stroke="rgba(168,85,247,0.4)" stroke-width="2"/>
  <text x="80" y="505" font-size="18" font-family="Arial" font-weight="bold" fill="#a855f7">AgentPay Solana</text>
  
  <rect x="280" y="470" width="220" height="50" rx="12" fill="rgba(6,182,212,0.2)" stroke="rgba(6,182,212,0.4)" stroke-width="2"/>
  <text x="300" y="505" font-size="18" font-family="Arial" font-weight="bold" fill="#06b6d4">Agent Studio</text>
  
  <!-- Right side: Stats -->
  <text x="900" y="250" font-size="80" font-family="Arial" font-weight="black" fill="white" text-anchor="middle">62+</text>
  <text x="900" y="300" font-size="18" font-family="Arial" fill="rgba(255,255,255,0.4)" text-anchor="middle">CloudFormation</text>
  <text x="900" y="330" font-size="18" font-family="Arial" fill="rgba(255,255,255,0.4)" text-anchor="middle">resources</text>
  
  <text x="900" y="430" font-size="80" font-family="Arial" font-weight="black" fill="white" text-anchor="middle">11</text>
  <text x="900" y="480" font-size="18" font-family="Arial" fill="rgba(255,255,255,0.4)" text-anchor="middle">AWS Endpoints</text>
</svg>